<!DOCTYPE html>
<html>
<head>
    <title>Echo Diastology Flowchart Solver</title>
	<link rel="stylesheet" type="text/css" href="/main-site/css/site.css">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="js/echo-d-math.js" defer></script>
</head>
<body>
    <h1>Echo Diastology Flowchart Solver V1.0.3</h1>
    <h2>Enter parameters:</h2>
    <label for="epSeptal">e' septal (cm/s):</label><br>
    <input type="text" id="epSeptal" name="epSeptal"><br>
    <label for="epLateral">e' lateral (cm/s):</label><br>
    <input type="text" id="epLateral" name="epLateral"><br>
    <label for="EeSeptal">E/e' septal:</label><br>
    <input type="text" id="EeSeptal" name="EeSeptal"><br>
    <label for="EeLateral">E/e' lateral:</label><br>
    <input type="text" id="EeLateral" name="EeLateral"><br>
    <label for="averageEe">average E/e':</label><br>
    <input type="text" id="averageEe" name="EeAverage"><br>
    <label for="LAVI">LAVI:</label><br>
    <input type="text" id="LAVI" name="LAVI"><br>
    <label for="TRVelocity">TR velocity (m/s):</label><br>
    <input type="text" id="TRVelocity" name="TRVelocity"><br>
    <label for="EA">E/A:</label><br>
    <input type="text" id="EA" name="EA"><br><br>
    <button onclick="update()">Calculate</button><br>
    <div id="output">output</div>
</body>
</html>
